  overview:["Cambodia is home to one of humanity's greatest architectural achievements — the temple complex of Angkor, built between the 9th and 15th centuries as the capital of the Khmer Empire. At its peak, Angkor was the largest pre-industrial city in the world, and today Angkor Wat remains the world's largest religious monument, its five towers an instantly recognisable silhouette against the Cambodian sky.","Beyond Angkor, Cambodia offers a genuinely moving travel experience. The country has emerged from one of the 20th century's most traumatic histories with remarkable resilience, and visitors to Phnom Penh inevitably find themselves reflecting deeply on humanity's capacity for both destruction and regeneration. The National Museum, the Royal Palace and the Killing Fields Memorial make Phnom Penh a profound cultural destination.","The Cambodian people are renowned for their warmth, and the country's food scene — particularly in Siem Reap — has blossomed into one of South-East Asia's most exciting. Cambodia is genuinely excellent value, making it ideal for young couples, culture enthusiasts and anyone wanting to cover multiple South-East Asian countries in one trip."],

  overview:["Sri Lanka is a teardrop-shaped island off the southern tip of India that packs an astonishing amount of beauty into its compact 65,610 square kilometres. Eight UNESCO World Heritage Sites — from the rock fortress of Sigiriya to the ancient city of Anuradhapura — make it one of Asia's richest cultural destinations. The southern coastline delivers pristine tropical beaches from Mirissa to Tangalle; the central highlands offer cool mountain air, waterfalls and the world's most scenic tea plantation railway.","The country's wildlife is exceptional for its size: Yala National Park has one of the world's highest densities of leopards, Wilpattu is wilder and less visited, and the waters off Mirissa offer blue whale watching from December to April — the largest animals on earth, just 90 minutes from Galle.","For Indian travellers, Sri Lanka carries unique resonance as the land of the Ramayana — Ravana's kingdom, Sita's captivity and Hanuman's leap are all mapped onto this landscape, making it a pilgrimage-linked destination for many Hindu families. The cultural familiarity, proximity and ease of the visa make it ideal for all client segments."],

  overview:["New Zealand is a country of staggering natural beauty — two main islands at the bottom of the Pacific Ocean, formed by the collision of tectonic plates, that have created a landscape unlike anywhere on earth. Geysers burst from the ground in Rotorua, glaciers calve into fjords in Westland, volcanoes steam in Tongariro, and the beaches of the Bay of Islands glow in colours that seem digitally enhanced.","The South Island in particular is a destination that leaves travellers permanently altered. Milford Sound — a fjord of sheer walls rising 1,200m from mirror-flat black water — is one of the most overwhelming natural spectacles on earth. Queenstown sits at the edge of Lake Wakatipu under the Remarkables mountain range and has built an entire economy around adventure: bungee jumping (invented here), skydiving, white-water rafting, heli-skiing and jet boating all within 30 minutes of each other.","New Zealand's Māori culture adds a spiritual and artistic dimension unique in the Pacific. The haka, the traditional welcome ceremony, the intricate carved meeting houses and the geothermal landscape of Whakarewarewa give the country a cultural depth that complements its extraordinary natural settings perfectly."],

  overview:["France is the world's most visited country — around 100 million tourists per year — and for good reason. No country on earth has invested more deliberately in culture, cuisine, architecture and lifestyle, and the returns are visible at every turn. Paris alone contains the Louvre (the world's most visited museum), the Eiffel Tower (the world's most photographed monument), Versailles (the world's most opulent palace) and a restaurant scene that has shaped global fine dining for three centuries.","Beyond Paris, France is revealed as a country of extraordinary regional diversity. The Mediterranean coast — the French Riviera from Nice to Monaco to Cannes — is Europe's most glamorous coastline, where the Côte d'Azur's blue-sea, golden-light palette has been inspiring artists since Matisse and Picasso. Provence's lavender fields, the limestone gorges of the Ardèche, the wine châteaux of Bordeaux and the Alps of Chamonix all add further dimensions to a country that rewards every visit differently.","For Indian travellers, France is among the most aspirational European destinations. The Schengen visa that covers France also unlocks Italy, Switzerland and Greece, making a multi-country Europe trip — Paris, Swiss Alps, Italian Lakes, Greek islands — an enormously popular and high-value product for Indian travel agents."],

const BUILT=["Azerbaijan","Bali","Bhutan","Cambodia","Dubai","France","Japan","Kerala","Maldives","New Zealand","Australia","Rajasthan","Singapore","Sri Lanka","Thailand","Vietnam"];

let currentView="hub";
let currentRegion="ALL";
let searchQuery="";

function getD(name){return ALL_DATA[name]||{...PLACEHOLDER_DATA,name,flag:FLAGS[name]||"🌍",tagline:"Destination guide coming soon",quickstats:{Capital:"—",Currency:"—",Language:"—",TimeZone:"—",BestTime:"—"}};}

function render(){
  const app=document.getElementById("app");
  if(currentView==="hub"){app.innerHTML=renderHub();}
  else{app.innerHTML=renderDest(currentView);}
  attachEvents();
}

function nav(){
  return `<div class="top-nav"><div class="nav-logo"><div class="nav-logo-bars">${["#1e3a5f","#185fa5","#1abc9c","#3b6d11","#ba7517","#a32d2d"].map((c,i)=>`<div class="nav-bar" style="background:${c};height:${14+i*2}px"></div>`).join("")}</div><span class="nav-wordmark">ORN</span></div><span class="nav-badge">Destination Wiki</span></div>`;
}

function renderHub(){
  const allDests=Object.entries(DESTS);
  const filtered=allDests.map(([region,dests])=>{
    let fd=dests;
    if(currentRegion!=="ALL")fd=region===currentRegion?dests:[];
    if(searchQuery)fd=fd.filter(d=>d.toLowerCase().includes(searchQuery.toLowerCase()));
    return[region,fd];
  }).filter(([_,d])=>d.length>0);
  const total=Object.values(DESTS).flat().length;
  return `${nav()}<div class="hub-hero"><h1>Destination Knowledge Hub</h1><p>${total} destinations across 4 regions — everything your team needs to sell with confidence</p><div class="hub-search"><input type="text" placeholder="Search destinations..." id="search-input" value="${searchQuery}" /></div></div><div class="region-tabs">${["ALL","ASIA","EUROPE","INDIA","OCEANIA"].map(r=>`<button class="rtab${currentRegion===r?" active":""}" data-region="${r}">${r==="ALL"?"All regions":r}</button>`).join("")}</div><div class="hub-body">${filtered.map(([region,dests])=>`<div class="region-label">${region}</div><div class="dest-grid">${dests.map(d=>`<div class="dest-card${BUILT.includes(d)?" featured":""}" data-dest="${d}"><span class="flag">${FLAGS[d]||"🌍"}</span><div class="dname">${d}</div>${BUILT.includes(d)?`<span class="built-badge"><i class="ti ti-check" style="font-size:10px"></i> Full guide</span>`:`<span class="soon-tag">Coming soon</span>`}</div>`).join("")}</div>`).join("")}</div>`;
}

function visaBadge(b){if(b==="voa")return`<span class="voa-badge"><i class="ti ti-check" style="font-size:12px"></i> Visa on Arrival</span>`;if(b==="evisa")return`<span class="evisa-badge"><i class="ti ti-check" style="font-size:12px"></i> e-Visa</span>`;if(b==="free")return`<span class="free-badge"><i class="ti ti-check" style="font-size:12px"></i> Visa Free</span>`;return`<span class="sticker-badge"><i class="ti ti-info-circle" style="font-size:12px"></i> Sticker Visa</span>`;}

function renderDest(name){
  const d=getD(name);
  const imgSlug=name.toLowerCase().replace(/\s+/g,"-").replace(/&/g,"and");
  const heroGrad=HERO_COLORS[name]||"135deg,#1a3a6b 0%,#2e7d5e 100%";
  return `${nav()}<div class="dest-back" id="back-btn"><i class="ti ti-arrow-left"></i> All destinations</div>
  <div class="dest-hero" style="background:linear-gradient(${heroGrad})">
    <img src="https://raw.githubusercontent.com/your-org/orn-wiki/main/images/${imgSlug}.png" alt="${name}" onerror="this.style.display='none'" style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover">
    <div class="dest-hero-overlay"><div class="dest-hero-name">${d.flag} ${d.name}</div><div class="dest-hero-tagline">${d.tagline}</div></div>
  </div>
  <div class="dest-quickstats">${Object.entries(d.quickstats).map(([k,v])=>`<div class="qs-item"><div class="qs-label">${k}</div><div class="qs-value">${v}</div></div>`).join("")}</div>
  <div class="dest-body">
    <div class="section-card">
      <div class="section-title"><i class="ti ti-rosette-discount-check" aria-hidden="true"></i> Key selling points</div>
      <div class="ksp-grid">${(d.ksp||[]).map(k=>`<div class="ksp-item"><div class="ksp-title">${k.title}</div><div class="ksp-desc">${k.desc}</div></div>`).join("")}</div>
    </div>
    <div class="section-card">
      <div class="section-title"><i class="ti ti-star" aria-hidden="true"></i> Why sell ${d.name}</div>
      <ul class="sell-bullets">${d.sell.map(s=>`<li>${s}</li>`).join("")}</ul>
      <div class="traveller-types">${d.travellerTypes.map(t=>`<span class="tt-chip${(d.highlightTypes||[]).some(h=>t.startsWith(h))?" highlight":""}">${t}</span>`).join("")}</div>
    </div>
    <div class="section-card">
      <div class="section-title"><i class="ti ti-plane" aria-hidden="true"></i> Flights from India</div>
      <div style="overflow-x:auto"><table class="flight-table"><thead><tr><th>From</th><th>To</th><th>Airlines</th><th>Duration</th><th>Type</th><th>Frequency</th></tr></thead><tbody>${d.flights.map(f=>`<tr><td>${f.from}</td><td>${f.to}</td><td style="color:var(--color-text-secondary)">${f.airlines}</td><td>${f.time}</td><td><span class="${f.type==="direct"?"direct-badge":"connect-badge"}">${f.type==="direct"?"Direct":"Connecting"}</span></td><td style="color:var(--color-text-secondary)">${f.freq}</td></tr>`).join("")}</tbody></table></div>
    </div>
    <div class="section-card">
      <div class="section-title"><i class="ti ti-id" aria-hidden="true"></i> Visa & entry requirements</div>
      <div style="margin-bottom:12px">${visaBadge(d.visa.badge)}</div>
      <div class="visa-grid">
        <div class="visa-item"><div class="visa-item-label">Visa type</div><div class="visa-item-value">${d.visa.type}</div></div>
        <div class="visa-item"><div class="visa-item-label">Cost</div><div class="visa-item-value">${d.visa.cost}</div></div>
        <div class="visa-item"><div class="visa-item-label">Validity</div><div class="visa-item-value">${d.visa.validity}</div></div>
        <div class="visa-item"><div class="visa-item-label">Processing</div><div class="visa-item-value">${d.visa.processing}</div></div>
      </div>
      <div style="margin-top:10px;padding:10px 12px;background:var(--color-background-secondary);border-radius:var(--border-radius-md)">
        <div style="font-size:11px;color:var(--color-text-tertiary);margin-bottom:4px">Documents required</div>
        <div style="font-size:13px;color:var(--color-text-primary)">${d.visa.documents}</div>
      </div>
    </div>
    <div class="section-card">
      <div class="section-title"><i class="ti ti-map" aria-hidden="true"></i> Destination overview</div>
      <div class="overview-text">${d.overview.map(p=>`<p>${p}</p>`).join("")}</div>
    </div>
    <div class="section-card">
      <div class="section-title"><i class="ti ti-sun" aria-hidden="true"></i> Weather & best time to visit</div>
      <div class="weather-grid">${d.weather.map(w=>`<div class="month-cell ${w.type==="peak"?"peak":w.type==="low"?"low":""}"><div class="mo">${w.mo}</div><span class="icon">${w.icon}</span><div class="temp">${w.temp}</div></div>`).join("")}</div>
      <div class="season-legend"><div class="sl-item"><div class="sl-dot" style="background:#b5d4f4"></div>Peak</div><div class="sl-item"><div class="sl-dot" style="background:var(--color-border-tertiary)"></div>Shoulder</div><div class="sl-item"><div class="sl-dot" style="background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary)"></div>Low / wet</div></div>
      <div style="margin-top:12px;padding:10px 12px;background:#e6f1fb;border-radius:var(--border-radius-md)"><div style="font-size:12px;color:#0c447c"><strong>India travel tip:</strong> ${d.weatherTip}</div></div>
    </div>
    <div class="section-card">
      <div class="section-title"><i class="ti ti-sparkles" aria-hidden="true"></i> Top experiences & must-see sights</div>
      <div class="exp-grid">${d.experiences.map(e=>`<div class="exp-card"><div class="exp-img" style="background:${e.color}">${e.bg}</div><div class="exp-info"><div class="exp-name">${e.name}</div><div class="exp-desc">${e.desc}</div><span class="exp-cat" style="background:${e.color};color:${e.textColor}">${e.cat}</span></div></div>`).join("")}</div>
    </div>
    <div class="section-card">
      <div class="section-title"><i class="ti ti-info-circle" aria-hidden="true"></i> Practical information</div>
      <div class="practical-grid">${d.practical.map(p=>`<div class="practical-item"><div class="pi-label"><i class="ti ${p.icon}" style="font-size:12px" aria-hidden="true"></i>${p.label}</div><div class="pi-value">${p.value}</div></div>`).join("")}</div>
    </div>
    <div class="section-card">
      <div class="section-title"><i class="ti ti-bowl-chopsticks" aria-hidden="true"></i> Food & dining</div>
      <div class="food-grid">${d.food.map(f=>`<div class="food-item"><span class="food-emoji">${f.emoji}</span><div class="food-name">${f.name}</div><div class="food-desc">${f.desc}</div></div>`).join("")}</div>
      <div style="margin-top:12px;padding:10px 12px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);font-size:13px;color:var(--color-text-secondary);line-height:1.6"><strong style="color:var(--color-text-primary)">Dietary note:</strong> ${d.dietNotes}</div>
    </div>
    <div class="section-card">
      <div class="section-title"><i class="ti ti-link" aria-hidden="true"></i> Useful links</div>
      <div class="links-list">${d.links.map(l=>`<div class="link-row" onclick="openLink('${l.url}')"><div class="link-row-label"><i class="ti ${l.icon}" aria-hidden="true"></i>${l.label}</div><i class="ti ti-external-link" style="font-size:14px;color:var(--color-text-tertiary)" aria-hidden="true"></i></div>`).join("")}</div>
    </div>
    <div class="disclaimer"><strong>Disclaimer:</strong> Information in this guide is compiled for sales reference purposes and may change without notice. Visa fees, flight schedules and entry requirements should always be verified against official government and airline sources before advising clients. ORN / Trip Factory accepts no liability for inaccuracies. Last reviewed May 2026.</div>
  </div>`;
}

function attachEvents(){
  document.querySelectorAll(".rtab").forEach(btn=>{btn.addEventListener("click",()=>{currentRegion=btn.dataset.region;render();});});
  document.querySelectorAll(".dest-card").forEach(card=>{card.addEventListener("click",()=>{currentView=card.dataset.dest;render();window.scrollTo(0,0);});});
  const si=document.getElementById("search-input");
  if(si)si.addEventListener("input",e=>{searchQuery=e.target.value;render();});
  const bb=document.getElementById("back-btn");
  if(bb)bb.addEventListener("click",()=>{currentView="hub";render();window.scrollTo(0,0);});
}

render();
</script>
